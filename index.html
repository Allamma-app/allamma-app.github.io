<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اللمّة — حمّل اللعبة</title>
<meta name="description" content="اللمّة — لعبة ثقافية جماعية. حمّلها الحين!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(160deg, #6B0F24 0%, #4A0916 50%, #3D0812 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.logo {
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 4px 16px rgba(0,0,0,0.5);
  margin-bottom: 8px;
}
.subtitle {
  color: #ffccbb;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 36px;
}
.links {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.link-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 16px 20px;
  text-decoration: none;
  color: #1a1a1a;
  font-size: 18px;
  font-weight: 700;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.link-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.link-btn:active {
  transform: scale(0.98);
}
.link-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.link-icon img {
  width: 32px;
  height: 32px;
  object-fit: contain;
}
.link-text {
  flex: 1;
  text-align: right;
}
.link-sub {
  font-size: 12px;
  color: #888;
  font-weight: 600;
}
.divider {
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 10px 0;
}
.social-row {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}
.social-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  text-decoration: none;
  transition: background 0.15s;
}
.social-btn:hover {
  background: rgba(255,255,255,0.25);
}
.footer {
  margin-top: 32px;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">اللمّة</div>
  <div class="subtitle">لعبة ثقافية جماعية 🎲</div>

  <div class="links">
    <a class="link-btn" href="https://apps.apple.com/app/id6760367652" target="_blank">
      <div class="link-icon">🍎</div>
      <div class="link-text">
        تطبيق الآيفون | iOS
        <div class="link-sub">متوفر على App Store</div>
      </div>
    </a>

    <a class="link-btn" href="#" target="_blank" style="opacity:0.5;pointer-events:none;">
      <div class="link-icon">🤖</div>
      <div class="link-text">
        تطبيق الأندرويد | Android
        <div class="link-sub">قريباً على Google Play</div>
      </div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="social-row">
    <a class="social-btn" href="https://www.instagram.com/allamma.app" target="_blank">📸</a>
    <a class="social-btn" href="https://www.tiktok.com/@allamma.app" target="_blank">🎵</a>
  </div>

  <div class="footer">allamma.app</div>
</div>
</body>
</html>
